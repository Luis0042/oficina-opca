<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oficina OPCA | Performance Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0f12;
            --panel-bg: rgba(25, 28, 36, 0.7);
            --primary: #e63946;
            --primary-hover: #ff4d5a;
            --text-main: #f1faee;
            --text-muted: #a8b2c1;
            --border: rgba(255, 255, 255, 0.1);
            --success: #00b894;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at top right, #1a1e29 0%, var(--bg-color) 100%);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        header h1 {
            margin: 0;
            font-size: 3em;
            font-weight: 800;
            background: linear-gradient(90deg, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1em;
            margin-top: 5px;
            font-weight: 300;
        }

        .panel {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            margin-bottom: 30px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        /* O campo do chassi ocupa a linha toda */
        .full-width {
            grid-column: 1 / -1;
        }

        label {
            margin-bottom: 8px;
            font-size: 0.85em;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        select {
            appearance: none;
            padding: 14px 18px;
            background-color: rgba(0, 0, 0, 0.3);
            color: #fff;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1em;
            font-family: 'Montserrat', sans-serif;
            outline: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(230, 57, 70, 0.2);
        }

        select:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        button {
            grid-column: 1 / -1;
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 8px;
            font-size: 1.2em;
            font-weight: 800;
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(230, 57, 70, 0.3);
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(230, 57, 70, 0.4);
        }

        /* Estilização da Telemetria (Dinamômetro) */
        .results {
            display: none;
            border-top: 4px solid var(--primary);
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .results-header {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .results-header h2 {
            margin: 0;
            color: var(--text-main);
            font-weight: 700;
        }

        .specs-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .metric-card {
            background: rgba(0, 0, 0, 0.4);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .metric-card.destaque {
            border-color: var(--primary);
            background: rgba(230, 57, 70, 0.05);
        }

        .metric-label {
            font-size: 0.75em;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .metric-value {
            font-size: 1.4em;
            font-weight: 700;
            color: var(--text-main);
        }

        .highlight-text {
            color: var(--primary);
        }

        .alert-text {
            display: block;
            color: #ff9f43;
            font-size: 0.5em;
            margin-top: 4px;
        }

        @media (max-width: 600px) {
            .form-grid, .specs-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

    </header>

                    <option value="PSA">PSA (Peugeot/Citroën)</option>
                    <option value="Hyundai">Hyundai</option>
                </select>
            </div>

            <div class="form-group">
                <label for="motor">Motorização</label>

                    <option value="">-- Aguardando Montadora --</option>
                </select>
            </div>

            <div class="form-group full-width">
                <label for="carro">Chassi / Aerodinâmica</label>
                <select id="carro" disabled>
                    <option value="">-- Aguardando Motor --</option>
                </select>
            </div>

            <div class="form-group">
                <label for="tipoTuning">Categoria de Projeto</label>
                <select id="tipoTuning" onchange="atualizarStages()">
                    <option value="1">Aspirado (N/A)</option>
                    <option value="2">Sobrealimentado (Turbo)</option>
                </select>
            </div>

            <div class="form-group">

            </div>

            <button onclick="calcularFisica()">GERAR TELEMETRIA</button>
        </div>
    </div>

    <div id="painelResultados" class="panel results">

        <div class="specs-grid">

            </div>
            <div class="metric-card destaque">

            </div>
            <div class="metric-card">
                <span class="metric-label">Relação Peso/Potência</span>

            </div>
            <div class="metric-card destaque">

                    <span id="resZeroCem">-</span>

            </div>

            </div>

        </div>

</div>

        {id: 56, motor_id: 46, nome: "Elantra Sedan 2.0", peso: 1250, cx: 0.29, area: 2.10},
        {id: 57, motor_id: 47, nome: "Azera Sedan 3.3 V6", peso: 1620, cx: 0.29, area: 2.25}
    ];
    // ==================================================
    // LÓGICA DE INTERFACE E FÍSICA
    // ==================================================
    function carregarMotores() {
        const montadora = document.getElementById("montadora").value;
        const selectMotor = document.getElementById("motor");
        const selectCarro = document.getElementById("carro");
        
        selectMotor.innerHTML = '<option value="">-- Selecionar Motor --</option>';
        selectCarro.innerHTML = '<option value="">-- Aguardando Motor --</option>';
        selectCarro.disabled = true;

        if (!montadora) {
            selectMotor.disabled = true;
            return;
        }

        const motoresFiltrados = banco_motores.filter(m => m.montadora === montadora);
        motoresFiltrados.forEach(m => {
            selectMotor.innerHTML += `<option value="${m.id}">${m.nome} (${m.cv}cv)</option>`;
        });
        
        selectMotor.disabled = false;
    }

    function carregarCarros() {
        const motorId = parseInt(document.getElementById("motor").value);
        const selectCarro = document.getElementById("carro");
        
        selectCarro.innerHTML = '<option value="">-- Selecionar Chassi --</option>';

        if (!motorId) {
            selectCarro.disabled = true;
            return;
        }

        const carrosFiltrados = banco_carros.filter(c => c.motor_id === motorId);
        carrosFiltrados.forEach(c => {
            selectCarro.innerHTML += `<option value="${c.id}">${c.nome} (${c.peso}kg)</option>`;
        });

        selectCarro.disabled = false;
    }

    function atualizarStages() {
        const tipo = document.getElementById("tipoTuning").value;
        const selectStage = document.getElementById("stage");
        
        if (tipo === "1") {
            selectStage.innerHTML = `
                <option value="1">Stage 1 (Intake/Escape)</option>
                <option value="2">Stage 2 (Comandos + 4x1)</option>
                <option value="3">Stage 3 (Cabeçote Trabalhado)</option>
                <option value="4">Stage 4 (ITB / Extremo)</option>
            `;
        } else {
            selectStage.innerHTML = `
                <option value="1">Stage 1 T (Turbo 0.5 bar)</option>
                <option value="2">Stage 2 T (Turbo 1.0 bar)</option>
                <option value="3">Stage 3 T (Forjado 1.5 bar)</option>
            `;
        }
    }

    function calcularFisica() {
        const carroId = parseInt(document.getElementById("carro").value);
        const motorId = parseInt(document.getElementById("motor").value);
        const tipo = document.getElementById("tipoTuning").value;
        const stage = parseInt(document.getElementById("stage").value);

        if (!carroId || !motorId) {
            alert("Piloto, você precisa selecionar o Motor e o Chassi primeiro!");
            return;
        }

        const motor = banco_motores.find(m => m.id === motorId);
        const carro = banco_carros.find(c => c.id === carroId);

        let cv_final = 0;
        let custo = 0;
        let nome_stage = "";
        let bonus_vtec = motor.vtec ? 1.10 : 1.0;

        if (tipo === "1") {
            if (stage === 1) { cv_final = motor.cv + ((motor.cv * 0.10) * motor.fluxo); custo = 2700; nome_stage = "Stg 1 AsPRO"; }
            if (stage === 2) { cv_final = motor.cv + ((motor.cv * 0.22) * motor.fluxo * bonus_vtec); custo = 5800; nome_stage = "Stg 2 AsPRO"; }
            if (stage === 3) { cv_final = motor.cv + ((motor.cv * 0.35) * motor.fluxo * bonus_vtec); custo = 10500; nome_stage = "Stg 3 AsPRO"; }
            if (stage === 4) { cv_final = motor.cv + ((motor.cv * 0.55) * motor.fluxo * bonus_vtec); custo = 22000; nome_stage = "Stg 4 Extrem"; }
        } else {
            if (stage === 1) { cv_final = motor.cv + ((motor.cv * 0.5) * motor.fluxo); custo = 12900; nome_stage = "Stg 1 Turbo"; }
            if (stage === 2) { cv_final = motor.cv + ((motor.cv * 1.0) * motor.fluxo); custo = 13650; nome_stage = "Stg 2 Turbo"; }
            if (stage === 3) { cv_final = motor.cv + ((motor.cv * 1.5) * motor.fluxo); custo = 26000; nome_stage = "Stg 3 Forjado"; }
        }

        // FÍSICA
        let potencia_watts = cv_final * 735.5 * 0.85; 
        let arrasto = 0.5 * 1.225 * carro.cx * carro.area;
        let vmax_ms = Math.cbrt(potencia_watts / arrasto); 
        let vmax_kmh = vmax_ms * 3.6;

        let relacao_peso = carro.peso / cv_final;
        let zero_cem = (relacao_peso * 0.55) + 2.5;
        let msg_tracao = "";
        
        if (cv_final > 250) {
            zero_cem += 0.8;
            msg_tracao = "⚠️ DESTRACIONANDO!";
        }

        // PREENCHENDO O PAINEL DE RESULTADOS
        document.getElementById("resCarroNome").innerText = carro.nome.toUpperCase();
        document.getElementById("resMotorStage").innerText = `${motor.nome} | ${nome_stage}`;
        document.getElementById("resCv").innerText = Math.round(cv_final) + " CV";
        document.getElementById("resRelacao").innerText = relacao_peso.toFixed(2) + " kg/cv";
        document.getElementById("resZeroCem").innerText = zero_cem.toFixed(2) + " s";
        document.getElementById("alertaTracao").innerText = msg_tracao;
        document.getElementById("resVmax").innerText = Math.round(vmax_kmh) + " km/h";
        document.getElementById("resCusto").innerText = "R$ " + custo.toLocaleString('pt-BR', {minimumFractionDigits: 2});

        // Mostra o painel com animação
        document.getElementById("painelResultados").style.display = "block";
    }
</script>
