<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oficina OPCA | Performance Dynamics G-Series</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dashboard: #14161a; /* Plástico escuro texturizado do painel G */
            --opc-silver: #c0c0c0; /* O prata acetinado do console central OPC G */
            --needle-red: #e74c3c; /* Vermelho/Laranja vibrante dos ponteiros OPC */
            --dial-face: #fdfefe; /* O branco clássico dos mostradores de esporte */
            --text-main: #f5f6fa;
            --text-muted: #7f8fa6;
            --border: rgba(0,0,0,0.15);
            --fivetech-orange: #f39c12; /* Cor do MID display original */
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-dashboard);
            /* Sutil textura de painel de carro */
            background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUt... [Textura de ruído removida para brevidade] ...');
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            margin: 0;
            font-size: 3.5em;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -2px;
            color: #fff;
            text-shadow: 0 4px 0 rgba(0,0,0,0.5);
        }

        header p {
            color: var(--text-muted);
            font-size: 1.2em;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* O CONSOLE CENTRAL (Inspired by image_68eae4.png) */
        .panel {
            background-color: var(--opc-silver);
            padding: 30px;
            border-radius: 20px; /* Bordas arredondadas e simétricas do console G */
            border: 4px solid rgba(0,0,0,0.2);
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.5), 0 10px 25px rgba(0,0,0,0.8);
            margin-bottom: 40px;
            position: relative;
        }

        .panel::after {
            content: '';
            position: absolute;
            top: 10px; left: 10px; right: 10px; bottom: 10px;
            border: 2px solid rgba(0,0,0,0.05);
            border-radius: 15px;
            pointer-events: none;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        label {
            margin-bottom: 8px;
            font-size: 0.9em;
            font-weight: 700;
            color: #333; /* Texto escuro no fundo prata */
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        select {
            appearance: none;
            padding: 15px 20px;
            background-color: #2c3e50; /* Botões escuros e táteis do console G */
            color: #fff;
            border: 2px solid #1a252f;
            border-radius: 8px;
            font-size: 1em;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            outline: none;
            transition: all 0.2s ease;
            cursor: pointer;
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.1), 0 2px 4px rgba(0,0,0,0.3);
        }

        select:focus {
            border-color: #fff;
            box-shadow: 0 0 0 3px rgba(255,255,255,0.2);
        }

        select:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* O BOTÃO GIGANTE DE ACELERAR (Inspired by hazards/sport buttons) */
        button {
            grid-column: 1 / -1;
            background: linear-gradient(to bottom, var(--needle-red) 0%, #c0392b 100%);
            color: white;
            border: 3px solid #962d22;
            padding: 20px;
            border-radius: 10px;
            font-size: 1.5em;
            font-weight: 900;
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.1s ease;
            box-shadow: 0 5px 0 #962d22, 0 8px 15px rgba(0,0,0,0.5);
            text-shadow: 0 2px 0 rgba(0,0,0,0.3);
        }

        button:hover {
            background: linear-gradient(to bottom, #ff4d5a 0%, var(--needle-red) 100%);
        }

        button:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #962d22, 0 4px 8px rgba(0,0,0,0.5);
        }

        /* O PAINEL DE INSTRUMENTOS (Dinamômetro OPC) */
        .results {
            display: none;
            animation: slideIn 0.4s ease-out forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .results-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .results-header h2 {
            margin: 0;
            font-size: 2em;
            color: #fff;
            font-weight: 900;
            text-transform: uppercase;
        }

        .results-header p {
            color: var(--text-muted);
            margin: 5px 0 0 0;
            text-transform: uppercase;
            font-size: 0.9em;
            letter-spacing: 1px;
        }

        /* Os Mostradores Circulares Brancos (The G OPC Soul) */
        .dials-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            justify-items: center;
        }

        .dial {
            width: 300px;
            height: 300px;
            background-color: var(--dial-face);
            border-radius: 50%;
            border: 15px solid #2c3e50; /* Aro grosso do mostrador G */
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.3), 0 15px 35px rgba(0,0,0,0.7);
            position: relative;
            overflow: hidden;
        }

        .dial::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 30px; height: 30px;
            background-color: #2c3e50;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        /* Números do Painel OPC (simples e sólidos) */
        .dial-label {
            position: absolute;
            color: #000;
            font-weight: 900;
            font-size: 1.8em;
            transform: translate(-50%, -50%);
        }

        .dial-label-zero { top: 85%; left: 25%; }
        .dial-label-max { top: 85%; left: 75%; }
        .dial-label-mid { top: 15%; left: 50%; }

        .dial-title {
            position: absolute;
            top: 65%; left: 50%;
            transform: translate(-50%, -50%);
            color: #7f8fa6;
            text-transform: uppercase;
            font-weight: 700;
            font-size: 0.9em;
            letter-spacing: 1px;
        }

        .dial-value {
            position: absolute;
            top: 75%; left: 50%;
            transform: translate(-50%, -50%);
            color: #000;
            font-weight: 900;
            font-size: 2.5em;
        }

        /* O PONTEIRO OPC */
        .needle {
            position: absolute;
            bottom: 50%; left: 50%;
            width: 8px;
            height: 120px; /* Tamanho do ponteiro */
            background-color: var(--needle-red);
            transform-origin: bottom center;
            transform: translateX(-50%) rotate(-120deg); /* Posição zero */
            transition: transform 1.5s cubic-bezier(0.19, 1, 0.22, 1); /* Animação suave de dinamômetro */
            z-index: 5;
            border-radius: 4px 4px 0 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        /* O Display Digital Laranja (MID display) */
        .mid-display {
            grid-column: 1 / -1;
            background-color: rgba(243, 156, 18, 0.1);
            border: 3px solid #2c3e50;
            padding: 20px;
            border-radius: 10px;
            margin-top: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.5);
        }

        .mid-metric {
            text-align: center;
            color: var(--fivetech-orange);
            font-family: 'Courier New', Courier, monospace; /* Fonte monoespaçada de display antigo */
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 5px rgba(243, 156, 18, 0.5);
        }

        .mid-label { font-size: 0.8em; margin-bottom: 5px; opacity: 0.8; }
        .mid-value { font-size: 1.8em; }

        .highlight-text { color: #fff; font-weight: 900; }
        
        .alert-mid {
            grid-column: 1 / -1;
            background-color: rgba(231, 76, 60, 0.2);
            color: #fff;
            border: 2px solid var(--needle-red);
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            font-weight: 900;
            margin-top: 15px;
            display: none;
        }

        @media (max-width: 800px) {
            .form-grid, .dials-container, .mid-display {
                grid-template-columns: 1fr;
            }
            .dial { width: 250px; height: 250px; }
        }
    </style>
</head>

    // ==================================================
    // LÓGICA DE INTERFACE E FÍSICA
    // ==================================================
    function carregarMotores() {
        const montadora = document.getElementById("montadora").value;
        const selectMotor = document.getElementById("motor");
        const selectCarro = document.getElementById("carro");
        
        selectMotor.innerHTML = '<option value="">-- Selecionar Motor --</option>';
        selectCarro.innerHTML = '<option value="">-- Aguardando Motor --</option>';
        selectCarro.disabled = true;

        if (!montadora) {
            selectMotor.disabled = true;
            return;
        }

        const motoresFiltrados = banco_motores.filter(m => m.montadora === montadora);
        motoresFiltrados.forEach(m => {
            selectMotor.innerHTML += `<option value="${m.id}">${m.nome} (${m.cv}cv)</option>`;
        });
        
        selectMotor.disabled = false;
    }

    function carregarCarros() {
        const motorId = parseInt(document.getElementById("motor").value);
        const selectCarro = document.getElementById("carro");
        
        selectCarro.innerHTML = '<option value="">-- Selecionar Chassi --</option>';

        if (!motorId) {
            selectCarro.disabled = true;
            return;
        }

        const carrosFiltrados = banco_carros.filter(c => c.motor_id === motorId);
        carrosFiltrados.forEach(c => {
            selectCarro.innerHTML += `<option value="${c.id}">${c.nome} (${c.peso}kg)</option>`;
        });

        selectCarro.disabled = false;
    }

    function atualizarStages() {
        const tipo = document.getElementById("tipoTuning").value;
        const selectStage = document.getElementById("stage");
        
        if (tipo === "1") {
            selectStage.innerHTML = `
                <option value="1">Stage 1 (Intake/Escape)</option>
                <option value="2">Stage 2 (Comandos + 4x1)</option>
                <option value="3">Stage 3 (Cabeçote Trabalhado)</option>
                <option value="4">Stage 4 (ITB / Extremo)</option>
            `;
        } else {
            selectStage.innerHTML = `
                <option value="1">Stage 1 T (Turbo 0.5 bar)</option>
                <option value="2">Stage 2 T (Turbo 1.0 bar)</option>
                <option value="3">Stage 3 T (Forjado 1.5 bar)</option>
            `;
        }
    }

    function calcularFisica() {
        const carroId = parseInt(document.getElementById("carro").value);
        const motorId = parseInt(document.getElementById("motor").value);
        const tipo = document.getElementById("tipoTuning").value;
        const stage = parseInt(document.getElementById("stage").value);

        if (!carroId || !motorId) {
            alert("Piloto, você precisa selecionar o Motor e o Chassi primeiro!");
            return;
        }

        const motor = banco_motores.find(m => m.id === motorId);
        const carro = banco_carros.find(c => c.id === carroId);

        let cv_final = 0;
        let custo = 0;
        let nome_stage = "";
        let bonus_vtec = motor.vtec ? 1.10 : 1.0;

        if (tipo === "1") {
            if (stage === 1) { cv_final = motor.cv + ((motor.cv * 0.10) * motor.fluxo); custo = 2700; nome_stage = "Stg 1 AsPRO"; }
            if (stage === 2) { cv_final = motor.cv + ((motor.cv * 0.22) * motor.fluxo * bonus_vtec); custo = 5800; nome_stage = "Stg 2 AsPRO"; }
            if (stage === 3) { cv_final = motor.cv + ((motor.cv * 0.35) * motor.fluxo * bonus_vtec); custo = 10500; nome_stage = "Stg 3 AsPRO"; }
            if (stage === 4) { cv_final = motor.cv + ((motor.cv * 0.55) * motor.fluxo * bonus_vtec); custo = 22000; nome_stage = "Stg 4 Extrem"; }
        } else {
            if (stage === 1) { cv_final = motor.cv + ((motor.cv * 0.5) * motor.fluxo); custo = 12900; nome_stage = "Stg 1 Turbo"; }
            if (stage === 2) { cv_final = motor.cv + ((motor.cv * 1.0) * motor.fluxo); custo = 13650; nome_stage = "Stg 2 Turbo"; }
            if (stage === 3) { cv_final = motor.cv + ((motor.cv * 1.5) * motor.fluxo); custo = 26000; nome_stage = "Stg 3 Forjado"; }
        }

        // FÍSICA
        let potencia_watts = cv_final * 735.5 * 0.85; 
        let arrasto = 0.5 * 1.225 * carro.cx * carro.area;
        let vmax_ms = Math.cbrt(potencia_watts / arrasto); 
        let vmax_kmh = vmax_ms * 3.6;

        let relacao_peso = carro.peso / cv_final;
        let zero_cem = (relacao_peso * 0.55) + 2.5;
        let destracionando = false;
        
        if (cv_final > 250) {
            zero_cem += 0.8;
            destracionando = true;
        }

        // PREENCHENDO O CLUSTER (Resultados)
        document.getElementById("resCarroNome").innerText = carro.nome.toUpperCase();
        
        // Atualiza números rápidos
        document.getElementById("resPeso").innerText = carro.peso;
        document.getElementById("resZeroCem").innerText = zero_cem.toFixed(2);
        document.getElementById("resCx").innerText = carro.cx.toFixed(2);
        document.getElementById("resCusto").innerText = "R$ " + custo.toLocaleString('pt-BR', {minimumFractionDigits: 2});

        // Alerta de tração
        document.getElementById("alertaTracao").style.display = destracionando ? "block" : "none";

        // ANIMAÇÃO DOS MOSTRADORES (Soul of the G OPC)
        const resCvTxt = document.getElementById("resCv");
        const resVmaxTxt = document.getElementById("resVmax");
        const needlePotencia = document.getElementById("needlePotencia");
        const needleVmax = document.getElementById("needleVmax");

        // O painel do Astra começa em -120deg e vai até +120deg (240 graus total)
        // Mapeamos os valores para a rotação do ponteiro

        // Potência: Mapeia de 0-500 CV para -120deg a +120deg
        let rotPotencia = (cv_final / 500) * 240 - 120;
        if (rotPotencia > 120) rotPotencia = 130; // Ponteiro "bate" no fim

        // Vmax: Mapeia de 100-300 Km/h para -120deg a +120deg
        // (A Vmax começa em 100 no mostrador para dar visual de carro rápido)
        let rotVmax = ((vmax_kmh - 100) / 200) * 240 - 120;
        if (rotVmax < -120) rotVmax = -120;
        if (rotVmax > 120) rotVmax = 130;

        // Aplica a rotação
        needlePotencia.style.transform = `translateX(-50%) rotate(${rotPotencia}deg)`;
        needleVmax.style.transform = `translateX(-50%) rotate(${rotVmax}deg)`;

        // Conta os números digitais
        contarNumero(resCvTxt, Math.round(cv_final));
        contarNumero(resVmaxTxt, Math.round(vmax_kmh));

        // Mostra o painel
        document.getElementById("painelResultados").style.display = "block";
    }

    // Função auxiliar para contar o número no digital
    function contarNumero(elemento, valorFinal) {
        let valorAtual = 0;
        let incremento = Math.ceil(valorFinal / 50);
        let timer = setInterval(() => {
            valorAtual += incremento;
            if (valorAtual >= valorFinal) {
                valorAtual = valorFinal;
                clearInterval(timer);
            }
            elemento.innerText = valorAtual;
        }, 30);
    }
</script>
